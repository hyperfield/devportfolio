services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_DEFAULT: ${DB_DEFAULT:-sqlite:////data/db.sqlite3}
      DEV_ALLOWED_HOSTS: ${DEV_ALLOWED_HOSTS:-127.0.0.1,localhost}
      STATIC_URL: ${STATIC_URL:-/static/}
      MEDIA_URL: ${MEDIA_URL:-/media/}
      MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}
    ports:
      - "${APP_BIND:-0.0.0.0:81}:8000"
    volumes:
      - ./data:/data
      - ./media:/app/media

  proxy:
    profiles:
      - proxy
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      SITE_HOSTS: ${SITE_HOSTS:-localhost}
    ports:
      - "${HTTP_BIND:-8080}:80"
      - "${HTTPS_BIND:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./media:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
